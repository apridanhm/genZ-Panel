services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: panel-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-panel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-panel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - panel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-panel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # NATS Message Broker
  nats:
    image: nats:2.10-alpine
    container_name: panel-nats
    restart: unless-stopped
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    command: ["-js", "-m", "8222"]
    volumes:
      - nats_data:/data
    networks:
      - panel-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Traefik Reverse Proxy (Production only)
  traefik:
    image: traefik:v3.0
    container_name: panel-traefik
    restart: unless-stopped
    profiles:
      - production
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=panel-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/letsencrypt
    networks:
      - panel-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${PANEL_DOMAIN}`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=admin:$$apr1$$xyz$$hashedpassword"

  # Core API Service
  core-api:
    build:
      context: .
      dockerfile: crates/core-api/Dockerfile
    image: ${REGISTRY:-local}/panel-core-api:${VERSION:-latest}
    container_name: panel-core-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-panel}:${POSTGRES_PASSWORD:-dev_password_123}@postgres:5432/${POSTGRES_DB:-panel}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      RUST_LOG: ${LOG_LEVEL:-info}
      PANEL_DOMAIN: ${PANEL_DOMAIN:-localhost}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - apps_data:/apps
    networks:
      - panel-network
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${PANEL_DOMAIN:-localhost}`) || Host(`api.${PANEL_DOMAIN:-localhost}`)"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  # Runtime Manager
  runtime-manager:
    build:
      context: .
      dockerfile: crates/runtime-manager/Dockerfile
    image: ${REGISTRY:-local}/panel-runtime-manager:${VERSION:-latest}
    container_name: panel-runtime-manager
    restart: unless-stopped
    profiles:
      - production
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-panel}:${POSTGRES_PASSWORD:-dev_password_123}@postgres:5432/${POSTGRES_DB:-panel}
      NATS_URL: nats://nats:4222
      RUST_LOG: ${LOG_LEVEL:-info}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - apps_data:/apps
      - buildpacks_data:/buildpacks
    networks:
      - panel-network
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  # Web Daemon
  web-daemon:
    build:
      context: .
      dockerfile: crates/web-daemon/Dockerfile
    image: ${REGISTRY:-local}/panel-web-daemon:${VERSION:-latest}
    container_name: panel-web-daemon
    restart: unless-stopped
    profiles:
      - production
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-panel}:${POSTGRES_PASSWORD:-dev_password_123}@postgres:5432/${POSTGRES_DB:-panel}
      NATS_URL: nats://nats:4222
      RUST_LOG: ${LOG_LEVEL:-info}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - apps_data:/apps
    networks:
      - panel-network
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  # Mail Daemon
  mail-daemon:
    build:
      context: .
      dockerfile: crates/mail-daemon/Dockerfile
    image: ${REGISTRY:-local}/panel-mail-daemon:${VERSION:-latest}
    container_name: panel-mail-daemon
    restart: unless-stopped
    profiles:
      - production
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-panel}:${POSTGRES_PASSWORD:-dev_password_123}@postgres:5432/${POSTGRES_DB:-panel}
      NATS_URL: nats://nats:4222
      RUST_LOG: ${LOG_LEVEL:-info}
      PANEL_DOMAIN: ${PANEL_DOMAIN:-localhost}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - mail_data:/mail
    networks:
      - panel-network
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  # DNS Daemon
  dns-daemon:
    build:
      context: .
      dockerfile: crates/dns-daemon/Dockerfile
    image: ${REGISTRY:-local}/panel-dns-daemon:${VERSION:-latest}
    container_name: panel-dns-daemon
    restart: unless-stopped
    profiles:
      - production
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-panel}:${POSTGRES_PASSWORD:-dev_password_123}@postgres:5432/${POSTGRES_DB:-panel}
      NATS_URL: nats://nats:4222
      RUST_LOG: ${LOG_LEVEL:-info}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - panel-network
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  # Backup Daemon
  backup-daemon:
    build:
      context: .
      dockerfile: crates/backup-daemon/Dockerfile
    image: ${REGISTRY:-local}/panel-backup-daemon:${VERSION:-latest}
    container_name: panel-backup-daemon
    restart: unless-stopped
    profiles:
      - production
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-panel}:${POSTGRES_PASSWORD:-dev_password_123}@postgres:5432/${POSTGRES_DB:-panel}
      NATS_URL: nats://nats:4222
      RUST_LOG: ${LOG_LEVEL:-info}
      BACKUP_SCHEDULE: "0 2 * * *"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - backup_data:/backups
      - apps_data:/apps:ro
    networks:
      - panel-network
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

networks:
  panel-network:
    driver: bridge

volumes:
  postgres_data:
  nats_data:
  traefik_data:
  apps_data:
  buildpacks_data:
  mail_data:
  backup_data:
